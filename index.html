    </div> <!-- Zatvaranje container diva iz tvog koda -->

    <script>
      fetch("./prices.json")
        .then(response => {
          if (!response.ok) throw new Error("Ne mogu učitati podatke.");
          return response.json();
        })
        .then(data => {
          const output = document.getElementById("out");
          const keys = Object.keys(data);

          if (keys.length === 0) {
            output.innerHTML = '<div class="empty-state"><p>Trenutno nema parfema na listi.</p></div>';
            return;
          }

          // Generisanje grida
          let gridHTML = '<div class="parfem-grid">';

          keys.forEach(name => {
            const item = data[name];
            
            // Logika za detekciju popusta (ako dodaš old_price u budućnosti)
            const imaPopust = item.old_price && item.price < item.old_price;
            
            gridHTML += `
              <div class="parfem-card">
                ${imaPopust ? '<span style="position:absolute; top:10px; right:10px; background:#e74c3c; color:white; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:bold; z-index:2;">AKCIJA</span>' : ''}
                
                <h2>${name}</h2>
                
                <div class="image-container">
                  ${item.image 
                    ? `<img src="${item.image}" alt="${name}" loading="lazy">` 
                    : '<span class="no-image">Slika nije dostupna</span>'}
                </div>

                <div class="price-section">
                  <span class="price-label">Trenutna cijena</span>
                  <div class="price-value">
                    ${imaPopust ? `<s style="color:#999; font-size:0.8em; margin-right:8px;">${item.old_price} €</s>` : ''}
                    <span style="${imaPopust ? 'color:#e74c3c; font-weight:bold;' : ''}">${item.price} €</span>
                  </div>
                </div>

                <a href="${item.url}" target="_blank" class="shop-link">Pogledaj na shopu</a>
              </div>
            `;
          });

          gridHTML += '</div>';
          output.innerHTML = gridHTML;
        })
        .catch(error => {
          document.getElementById("out").innerHTML = `
            <div class="error">
              <p>Nažalost, došlo je do greške pri učitavanju podataka.</p>
              <small>${error.message}</small>
            </div>
          `;
        });
    </script>
</body>
</html>
