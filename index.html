<div id="out">Učitavam...</div>

<script>
  fetch("prices.json")
    .then(r => r.json())
    .then(d => {
      // ako je više parfema po imenu, uzmi prvi:
      const firstKey = Object.keys(d)[0];
      const item = d[firstKey];

      document.getElementById("out").innerHTML = `
        <h2>${firstKey}</h2>
        ${item.image ? `<img src="${item.image}" alt="${firstKey}" style="max-width:200px;">` : ""}
        <p><a href="${item.url}" target="_blank">Link na shop</a></p>
        <p>Trenutna cijena: <b>${item.price} €</b></p>
      `;
    })
    .catch(e => {
      document.getElementById("out").textContent = "Greška: " + e;
    });
</script>
