<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja kolekcija parfema</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #999; margin-bottom: 1.5rem; }
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.filter-btn { padding: 7px 16px; font-size: 13px; border: 1px solid #333; border-radius: 20px; background: transparent; color: #aaa; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.filter-btn:hover { border-color: #555; color: #ddd; }
.filter-btn.active { background: #222; color: #fff; border-color: #666; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; transition: border-color 0.15s; }
.card:hover { border-color: #444; }
.card.hidden { display: none; }
.card-img-wrap {
  width: 100%; height: 180px; background: #ffffff;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.card-img-wrap img {
  height: 160px; width: auto; max-width: 88%;
  object-fit: contain; transition: transform 0.3s ease;
}
.card:hover .card-img-wrap img { transform: scale(1.05); }
.img-placeholder {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; color: #333; font-size: 13px; letter-spacing: 0.05em;
}
.card-body { padding: 1.1rem 1.25rem; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
.card-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
.card-sub { font-size: 11px; color: #777; margin-top: 3px; }
.card-sub.wishlist { color: #4ade80; }
.tier-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.tier-niche { background: #1e1a3a; color: #c4b5fd; }
.tier-dizajnerski { background: #0f2a1a; color: #6ee7b7; }
.tier-klon { background: #2a1e0a; color: #fcd34d; }
.time-row { display: flex; gap: 6px; margin-bottom: 10px; }
.time-day   { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #1a2a1a; color: #86efac; }
.time-night { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #1a1a2a; color: #a5b4fc; }
.time-both  { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #1a1a1a; color: #e2e8f0; border: 1px solid #333; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-bottom: 10px; }
.meta-label { font-size: 10px; font-weight: 600; color: #666; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.meta-value { font-size: 13px; color: #ddd; font-weight: 500; }
.proj-bar { display: flex; gap: 4px; margin-top: 4px; }
.proj-dot { width: 8px; height: 8px; border-radius: 50%; }
.proj-dot.on { background: #818cf8; }
.proj-dot.off { background: #2e2e2e; }
.clone-info { font-size: 11px; color: #777; margin-top: 2px; margin-bottom: 8px; }
.clone-info span { color: #fcd34d; font-weight: 600; }
.divider { height: 1px; background: #252525; margin: 10px 0; }
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.tag.office  { background: #0d1e33; color: #93c5fd; }
.tag.date    { background: #2a0d1a; color: #f9a8d4; }
.tag.night   { background: #1a0d2a; color: #d8b4fe; }
.tag.casual  { background: #0d2a10; color: #86efac; }
.tag.special { background: #2a1a0d; color: #fcd34d; }
.vibe { font-size: 12px; color: #888; margin-bottom: 4px; }
.vibe span { color: #ccc; font-weight: 600; }
.tip { font-size: 12px; color: #bbb; font-style: italic; padding-top: 9px; border-top: 1px solid #252525; margin-top: 8px; line-height: 1.6; }
.tip strong { color: #ddd; font-style: normal; font-weight: 600; }
</style>
</head>
<body>

<h1>Moja kolekcija parfema</h1>
<p class="subtitle">7 mirisa · filtriraj po prigodi · svi podaci provjereni</p>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all',this)">Svi</button>
  <button class="filter-btn" onclick="filter('office',this)">Kancelarija</button>
  <button class="filter-btn" onclick="filter('date',this)">Dejt</button>
  <button class="filter-btn" onclick="filter('night',this)">Izlazak</button>
  <button class="filter-btn" onclick="filter('casual',this)">Casual</button>
  <button class="filter-btn" onclick="filter('special',this)">Posebna prigoda</button>
</div>

<div class="grid" id="grid"></div>

<script>

  },

    imgDirect: "https://lattafa-usa.com/cdn/shop/products/asad_1024x1024.jpg",
    tags: ["night"], time: "night",
    trajanje: "8–10h", sezona: "Jesen · Zima", projekcija: 4, layering: "Vazelin",
    klon: true, original: "Dior Sauvage Elixir", originalPrice: "~130–150€/60ml",
    tagList: [["night","Izlazak"],["night","Klub"]],
    vibe: "Toplo, začinsko, životinjsko, noćno",
    tip: "Klon Dior Sauvage Elixir — recenzenti navode ~80% sličnost. Asad je slađi i agresivniji u otvaranju, Elixir glađi i kompleksniji. Ne koristi ljeti. Vazelin na vratu drži ga do jutra."
  },
  {
    name: "Prada Amber PH",
    sub: "Prada · Dizajnerski",
    tier: "dizajnerski", tierLabel: "Dizajnerski",
    img: "https://i5.walmartimages.com/asr/c1d3e2b5-6f4e-4c9d-ae5b-3d0f8c5e4b9f.jpeg",
    imgDirect: "https://www.prada.com/content/dam/pradanux_products/U/UXI/UXI05T/0R8F0002/UXI05T_0R8F0002_F0002_SLF.jpg",
    tags: ["office"], time: "day",
    trajanje: "5–7h", sezona: "Proljeće · Ljeto · Jesen", projekcija: 3, layering: "Balea Med",
    klon: false, original: null,
    tagList: [["office","Kancelarija"],["office","Sastanci"]],
    vibe: "Čisto, sapunasto, profesionalno, amber",
    tip: "Klasičan dnevni kancelarijski miris. Pazi na doziranje ljeti — na toploj koži slatkoća se pojačava. Nije pogodan za hladnu zimu, prelagan je."
  },
  {
    name: "Montblanc Explorer",
    sub: "Montblanc · Dizajnerski (inspirisan Creed Aventus)",
    tier: "dizajnerski", tierLabel: "Dizajnerski",
    img: "https://i5.walmartimages.com/asr/d2e4f3c6-7a5f-4d0e-bf6c-4e1a9d6f5c0a.jpeg",
    imgDirect: "https://www.montblanc.com/cdn-cgi/image/format=auto,quality=90/https://www.montblanc.com/media/catalog/product/M/B/MB124923_01.png",
    tags: ["casual","office"], time: "both",
    trajanje: "6–8h", sezona: "Sve sezone", projekcija: 3, layering: "Med + Vazelin",

    tagList: [["casual","Svaki dan"],["office","Posao"]],

  },
  {
    name: "Guerlain L\u2019Homme Id\u00e9al EDP",
    sub: "Guerlain · Dizajnerski",
    tier: "dizajnerski", tierLabel: "Dizajnerski",
    img: "https://i5.walmartimages.com/asr/e3f5a4d7-8b6a-4e1f-ca7d-5f2b0e7a6d1b.jpeg",

  },
  {
    name: "Paris Corner Celestial",
    sub: "✦ Klon — Ganymede (Marc-Antoine Barrois) · wishlist",
    subClass: "wishlist",
    tier: "klon", tierLabel: "Klon",
    img: "https://pariscorner.com/cdn/shop/products/CELESTIAL_100ML_main_800x.jpg",
    imgDirect: "https://pariscorner.com/cdn/shop/products/CELESTIAL_100ML_main_800x.jpg",
    tags: ["special","date"], time: "both",
    trajanje: "8–10h", sezona: "Proljeće · Ljeto · Jesen", projekcija: 4, layering: "Balea Med",
    klon: true, original: "Ganymede — Marc-Antoine Barrois", originalPrice: "nišni, ~180€",
    tagList: [["special","Posebna prigoda"],["date","Dejt"]],

  },
  {
    name: "Emper Stallion 53",

    imgDirect: "https://i5.walmartimages.com/seo/Emper-Stallion-53-Eau-De-Parfum_0a5a47a9-04a7-455f-b912-5704e1371eac.43579c65ba1b544fc359f7d7ac68b8b5.jpeg",
    tags: ["casual","date"], time: "both",
    trajanje: "7–9h", sezona: "Jesen · Zima · Proljeće", projekcija: 3, layering: "Vazelin",
    klon: true, original: "Santal 33 — Le Labo", originalPrice: "nišni, ~350€/100ml",
    tagList: [["casual","Casual"],["date","Dejt"],["special","Signature"]],
    vibe: "Suha sandalovina, koža, kardamom, unisex",
    tip: "Ljeto mu nije idealno — leather i amber su prebogati za vrućinu. Svako te pita šta nosiš — Santal 33 je jedan od najprepoznatljivijih mirisa na svijetu, a klon nosi isti DNA po puno povoljnijoj cijeni."
  }
];

function dots(n) {
  return Array.from({length:5}, (_,i) => `<div class="proj-dot ${i<n?'on':'off'}"></div>`).join('');
}

function timeLabel(t) {
  if (t==='day') return '<span class="time-day">Dan</span>';
  if (t==='night') return '<span class="time-night">Noć</span>';
  return '<span class="time-both">Dan &amp; Noć</span>';
}

function renderCards(list) {
  document.getElementById('grid').innerHTML = list.map(p => `
    <div class="card" data-tags="${p.tags.join(',')}">
      <div class="card-img-wrap">
        <img src="${p.imgDirect}" alt="${p.name}" data-fallback="${p.img}"
          style="opacity:0;transition:opacity 0.3s"
          onload="this.style.opacity=1"
          onerror="var fb=this.getAttribute('data-fallback');if(fb&&this.src!==fb){this.src=fb;this.style.opacity=1;}else{this.style.display='none';var d=document.createElement('div');d.className='img-placeholder';d.textContent=this.alt;this.parentElement.appendChild(d);}"
        >
      </div>
      <div class="card-body">
        <div class="card-header">
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-sub${p.subClass?' '+p.subClass:''}">${p.sub}</div>
          </div>
          <span class="tier-badge tier-${p.tier}">${p.tierLabel}</span>
        </div>
        <div class="time-row">${timeLabel(p.time)}</div>
        <div class="meta-grid">
          <div><div class="meta-label">Trajanje</div><div class="meta-value">${p.trajanje}</div></div>
          <div><div class="meta-label">Sezona</div><div class="meta-value">${p.sezona}</div></div>
          <div><div class="meta-label">Projekcija</div><div class="proj-bar">${dots(p.projekcija)}</div></div>
          <div><div class="meta-label">Layering</div><div class="meta-value">${p.layering}</div></div>
        </div>
        ${p.klon ? `<div class="clone-info">Original: <span>${p.original}</span> (${p.originalPrice})</div>` : ''}
        <div class="divider"></div>
        <div class="tags">${p.tagList.map(([cls,lbl])=>`<span class="tag ${cls}">${lbl}</span>`).join('')}</div>
        <div class="vibe">Vibe: <span>${p.vibe}</span></div>
        <div class="tip"><strong>Savjet:</strong> ${p.tip}</div>
      </div>
    </div>
  `).join('');
}

function filter(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', tag !== 'all' && !card.dataset.tags.includes(tag));
  });
}

renderCards(parfemi);
</script>
</body>
</html>
